name: Feature Integration Gates

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr-contract:
    name: PR Contract
    runs-on: ubuntu-latest
    outputs:
      lane: ${{ steps.validate.outputs.lane }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR Body Contract
        id: validate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          output=$(node scripts/validate-pr-body.mjs)
          echo "$output"
          lane=$(echo "$output" | grep '^lane=' | cut -d= -f2)
          if [ -z "$lane" ]; then
            echo "Failed to extract lane from validation output"
            exit 1
          fi
          echo "lane=$lane" >> "$GITHUB_OUTPUT"

  lane-b-automation:
    name: Lane B/C Automated Checks
    needs: pr-contract
    if: needs.pr-contract.outputs.lane == 'B' || needs.pr-contract.outputs.lane == 'C'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Lane B Gate Bundle
        run: npm run verify:lane:b

  lane-c-proof:
    name: Lane C Manual Proof Contract
    needs: pr-contract
    if: needs.pr-contract.outputs.lane == 'C'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Lane C Fields Present
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          node scripts/validate-pr-body.mjs
          echo "Lane C manual proof fields are present."
